<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniDi - @minidi/minidi-data-ghpage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      body { margin: 0; padding: 0; font-family: "Inter", sans-serif; background: #070b17; color: #f1f5f9; }
      mini-app { display: block; min-height: 100vh; }
    </style>
  </head>
  <body>
    <mini-app></mini-app>
    <script type="module">
      import { createMiniDiApp } from "./src/index.js";
      createMiniDiApp({
        countryCode: "xx",
        countryName: "Demo",
        countryEmoji: "\u{1F30D}",
        languages: ["en"],
        defaultLanguage: "en",
        title: "Demo Knowledge Graph",
        splashTitle: "\u{1F30D} MiniDi",
        splashMessage: "Loading demo...",
        githubRepo: "minidivn/minidi-vn-data",
        mapCenter: [20, 0],
        mapZoom: 2,
        slides: [
          { label: "Sample Image", lang: "en", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200&q=80", grad: "#1e3a5f" },
        ],
        eras: [
          { id: "ancient", emoji: "\u{1F3DB}", label: { en: "Ancient" }, years: [-3000, 500], color: "#8b5cf6" },
          { id: "medieval", emoji: "\u{1F3F0}", label: { en: "Medieval" }, years: [500, 1500], color: "#f59e0b" },
          { id: "modern", emoji: "\u{1F4F7}", label: { en: "Modern" }, years: [1500, 9999], color: "#22c55e" },
        ],
        translations: {
          en: {
            entities: "Entities", events: "Events", people: "People", places: "Places",
            all: "All", search: "Search...", noResults: "No matching entities",
            results: "{n} results", page: "Page {p} of {t}",
            prev: "Prev", next: "Next", details: "Details", relations: "Relations",
            wiki: "Open in WikiData", timeline: "Timeline", tree: "Dynasty Tree",
            builtWith: "Built with", source: "source",
            chatPlaceholder: "Ask about the graph...",
            entitiesTotal: "{n} entities",
            mapPlaces: "Places", mapPeople: "People", mapEvents: "Events",
          },
        },
        chatCountry: "the graph",
        chatGreeting: "Ask me about the knowledge graph — history, people, places, events.",
      });
    </script>
  </body>
</html>
